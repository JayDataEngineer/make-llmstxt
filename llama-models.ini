; llama.cpp Router Preset - Chat + Embedding Models
; Usage: llama-server --models-preset ./llama-models.ini --port 8001 --host 0.0.0.0
;
; Model names in API requests: "llm" or "embed"
; Example:
;   curl localhost:8001/v1/chat/completions -d '{"model": "llm", ...}'
;   curl localhost:8001/v1/embeddings -d '{"model": "embed", ...}'

version = 1

; Global settings shared across all models
[*]
n-gpu-layers = 99
cache-prompt = true

; ============================================
; LLM - Chat completions
; ============================================
[llm]
model = /home/ubuntu/models/Qwen3.5-27B-UD-Q4_K_XL.gguf
c = 8192
load-on-startup = true

; ============================================
; Embeddings - Semantic search
; ============================================
[embed]
model = /home/ubuntu/.cache/llama.cpp/jina-v5-small-clustering-Q5_K_M.gguf
embedding = true
pooling = mean
c = 2048
load-on-startup = true
