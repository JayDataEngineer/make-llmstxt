; llama.cpp Router Preset - Chat + Embedding Models
; Usage: llama-server --models-preset ./llama-models.ini
;
; This runs BOTH models from one server:
; - Chat requests → use "chat" model
; - Embedding requests → use "embed" model

version = 1

; Global settings
[*]
c = 8192
n-gpu-layers = 99
cache-prompt = true

; ============================================
; CHAT MODEL - Your main LLM for generation
; ============================================
; Replace with YOUR model path
[chat]
model = /path/to/your/chat-model.Q4_K_M.gguf
c = 8192
load-on-startup = true

; ============================================
; EMBEDDING MODEL - Small model for vector search
; ============================================
; Recommended: nomic-embed-text-v1.5 (274MB, good quality)
; Download: huggingface.co/nomic-ai/nomic-embed-text-v1.5-GGUF
[embed]
model = /path/to/nomic-embed-text-v1.5.Q4_K_M.gguf
embedding = true
pooling = mean
c = 512
load-on-startup = true
