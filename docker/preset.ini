; llama.cpp Router Preset
; Docs: https://github.com/ggml-org/llama.cpp/blob/master/tools/server/README.md

version = 1

; Global settings inherited by all models
[*]
n-gpu-layers = 99
cache-prompt = true

; LLM Model (lazy-loaded on first request)
[llm]
model = /models/llm.gguf
c = 32768        ; context size (increase for longer documents)
load-on-startup = false
temp = 0.6
top-p = 0.95
top-k = 20
min-p = 0.0
presence-penalty = 0.0
repeat-penalty = 1.0

; Embedding Model (jina-embeddings-v5-text-small)
; Uses CPU to save GPU memory for LLM
[embed]
model = /models/embed.gguf
embedding = true
pooling = last    ; last-token pooling for jina-v5
c = 32768         ; max sequence length for jina-v5
ubatch-size = 1024 ; physical batch size for larger inputs
n-gpu-layers = 0  ; run on CPU to save VRAM for LLM
load-on-startup = false
