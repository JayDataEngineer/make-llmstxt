; llama.cpp Router Preset
; Docs: https://github.com/ggml-org/llama.cpp/blob/master/tools/server/README.md

version = 1

; Global settings inherited by all models
[*]
n-gpu-layers = 99
cache-prompt = true

; LLM Model
[llm]
model = /models/llm.gguf
c = 8192
load-on-startup = true
temp = 0.6
top-p = 0.95
top-k = 20
min-p = 0.0
presence-penalty = 0.0
repeat-penalty = 1.0

; Embedding Model
[embed]
model = /models/embed.gguf
embedding = true
pooling = mean
c = 2048
load-on-startup = true
